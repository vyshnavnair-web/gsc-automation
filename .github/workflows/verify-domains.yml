name: Verify Pending GSC Domains

on:
  schedule:
    - cron: '30 4 * * *'   # 10:00 AM IST
    - cron: '30 12 * * *'  # 6:00 PM IST
  workflow_dispatch:        # manual trigger for testing

jobs:
  verify:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push the updated pending-domains.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run verification script
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSC_OWNER_EMAILS: ${{ secrets.GSC_OWNER_EMAILS }}
          SITEMAP_PATHS: ${{ secrets.SITEMAP_PATHS }}
        run: node src/scripts/runVerification.js

      - name: Commit updated pending-domains.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pending-domains.json
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: update pending-domains.json [skip ci]"
          git push
